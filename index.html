<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Анимированный таймер</title>
    <link rel="stylesheet" href="timer.css" />
  </head>
  <body>
    <div class="timer-container">
      <h1 class="timer-title">Таймер</h1>

      <div class="timer-controls">
        <div class="input-group">
          <input
            type="number"
            id="minutesInput"
            min="0"
            max="99"
            value="5"
            class="timer-input"
          />
          <span class="input-label">мин</span>
        </div>
        <div class="button-group">
          <button id="startBtn" class="btn btn-primary">Старт</button>
          <button id="pauseBtn" class="btn btn-secondary" disabled>
            Пауза
          </button>
          <button id="resetBtn" class="btn btn-outline">Сброс</button>
        </div>
      </div>

      <div class="timer-display">
        <svg class="progress-ring" viewBox="0 0 300 300">
          <circle class="ring-bg" cx="150" cy="150" r="130" />
          <circle
            class="ring-progress"
            id="progressCircle"
            cx="150"
            cy="150"
            r="130"
          />
          <text
            class="ring-time"
            id="timeDisplay"
            x="150"
            y="145"
            text-anchor="middle"
          >
            05:00
          </text>
          <text
            class="ring-status"
            id="statusDisplay"
            x="150"
            y="175"
            text-anchor="middle"
          >
            Готов
          </text>
        </svg>
      </div>
    </div>

    <script src="timer.js"></script>
  </body>
</html>
